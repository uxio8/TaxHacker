services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: ["tunnel", "--no-autoupdate", "--url", "http://host.docker.internal:7331", "run"]
    env_file:
      - .env.tunnel
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "25M"
        max-file: "2"

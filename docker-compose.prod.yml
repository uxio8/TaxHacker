name: ledgerflow-prod

services:
  app:
    image: ledgerflow:${APP_IMAGE_TAG:-prod}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      ANALYSIS_WORKER_AUTOSTART: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:7331:7331"
    volumes:
      - ledgerflow_app_data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const port=process.env.PORT||'7331';fetch('http://127.0.0.1:'+port+'/',{redirect:'manual'}).then((res)=>process.exit(res.status>=200&&res.status<400?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  analysis-worker:
    image: ledgerflow:${APP_IMAGE_TAG:-prod}
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "--experimental-strip-types", "./scripts/analysis-worker.ts"]
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      ANALYSIS_WORKER_AUTOSTART: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ledgerflow_app_data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const fs=require('node:fs');const path=require('node:path');const uploadPath=process.env.UPLOAD_PATH||'/app/data/uploads';const heartbeatPath=path.resolve(uploadPath,'..','runtime','analysis-worker-heartbeat.json');try{const heartbeat=JSON.parse(fs.readFileSync(heartbeatPath,'utf8'));const age=Date.now()-Date.parse(heartbeat.updatedAt);process.exit(Number.isFinite(age)&&age<=45000?0:1)}catch{process.exit(1)}\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    init: true
    stop_grace_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ledgerflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ledgerflow_app_data:
  ledgerflow_postgres_data:

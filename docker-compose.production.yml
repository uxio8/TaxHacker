services:
  app:
    image: ghcr.io/your-org/ledgerflow:latest
    container_name: ledgerflow_app
    networks:
      - ledgerflow_network
    environment:
      - NODE_ENV=production
      - BASE_URL=https://ledgerflow.example.com
      - SELF_HOSTED_MODE=false
      - UPLOAD_PATH=/app/data/uploads
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:7331:7331"
    logging:
      driver: "json-file"
      options:
        max-size: "100M"
        max-file: "3"

  analysis-worker:
    image: ghcr.io/your-org/ledgerflow:latest
    container_name: ledgerflow_analysis_worker
    command: ["npm", "run", "worker:analysis"]
    networks:
      - ledgerflow_network
    environment:
      - NODE_ENV=production
      - BASE_URL=https://ledgerflow.example.com
      - SELF_HOSTED_MODE=false
      - UPLOAD_PATH=/app/data/uploads
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "100M"
        max-file: "3"

networks:
  ledgerflow_network:
    driver: bridge
